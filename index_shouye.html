<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水豚噜噜萌宠乐园</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
</head>
<body>
    <header id="main-header">
        <nav class="navbar">
            <div class="logo">
                <span class="capy-icon">🦫</span>
                <h1>水豚噜噜</h1>
            </div>
            <ul class="nav-links">
                <li><a href="index.html" class="active">首页</a></li>
                <li><a href="about.html">关于噜噜</a></li>
                <li><a href="interact.html">互动乐园</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero-section">
            <div class="hero-content">
                <h2>欢迎来到水豚噜噜的世界</h2>
                <p>可爱、治愈、萌化你的心</p>
                <a href="interact.html" class="cta-button">开始互动</a>
            </div>
            <div class="hero-image">
                <div class="capy-container" id="main-capy">
                    <div class="capy-body">
                        <div class="capy-head">
                            <div class="capy-ears">
                                <span class="ear left"></span>
                                <span class="ear right"></span>
                            </div>
                            <div class="capy-face">
                                <div class="eyes">
                                    <span class="eye left"></span>
                                    <span class="eye right"></span>
                                </div>
                                <div class="nose"></div>
                                <div class="mouth"></div>
                            </div>
                        </div>
                        <div class="capy-body-part"></div>
                        <div class="capy-legs">
                            <span class="leg"></span>
                            <span class="leg"></span>
                            <span class="leg"></span>
                            <span class="leg"></span>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="features-section">
            <h3>噜噜的特点</h3>
            <div class="features-grid">
                <article class="feature-card">
                    <div class="feature-icon">😊</div>
                    <h4>性格温顺</h4>
                    <p>水豚是世界上最温顺的动物之一，非常适合作为萌宠</p>
                </article>
                <article class="feature-card">
                    <div class="feature-icon">💧</div>
                    <h4>喜欢游泳</h4>
                    <p>水豚是优秀的游泳健将，能在水中待很长时间</p>
                </article>
                <article class="feature-card">
                    <div class="feature-icon">🌿</div>
                    <h4>素食动物</h4>
                    <p>主要以植物为食，喜欢吃草和水生植物</p>
                </article>
                <article class="feature-card">
                    <div class="feature-icon">👨👩👧👦</div>
                    <h4>社交达人</h4>
                    <p>喜欢和其他动物交朋友，是动物界的社交明星</p>
                </article>
            </div>
        </section>

        <section class="gallery-section">
            <h3>噜噜的日常</h3>
            <div class="gallery-container">
                <figure class="gallery-item">
                    <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=cute%20capybara%20swimming%20in%20water%20cartoon%20style&image_size=square" alt="噜噜游泳">
                    <figcaption>水中嬉戏</figcaption>
                </figure>
                <figure class="gallery-item">
                    <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=cute%20capybara%20eating%20grass%20cartoon%20style&image_size=square" alt="噜噜吃草">
                    <figcaption>享受美食</figcaption>
                </figure>
                <figure class="gallery-item">
                    <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=cute%20capybara%20sleeping%20cartoon%20style&image_size=square" alt="噜噜睡觉">
                    <figcaption>甜美梦乡</figcaption>
                </figure>
            </div>
        </section>

        <section class="newsletter-section">
            <h3>订阅噜噜的消息</h3>
            <form id="newsletter-form">
                <input type="email" id="email-input" placeholder="输入你的邮箱" required>
                <button type="submit" class="submit-btn">订阅</button>
            </form>
            <p class="form-message" id="form-message"></p>
        </section>
    </main>

    <footer id="main-footer">
        <div class="footer-content">
            <p>&copy; 2024 水豚噜噜萌宠乐园</p>
            <div class="social-links">
                <a href="#" class="social-link">📱</a>
                <a href="#" class="social-link">📸</a>
                <a href="#" class="social-link">💬</a>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
